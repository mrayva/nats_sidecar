name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: gcc-${{ matrix.gcc }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        gcc: [13, 14]

    env:
      CC: gcc-${{ matrix.gcc }}
      CXX: g++-${{ matrix.gcc }}

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: >-
          sudo apt-get update && sudo apt-get install -y
          g++-${{ matrix.gcc }} ninja-build

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgGitCommitId: 4e82e29f14eac2b3422f18f72c7524d04f19924e

      - name: Configure
        run: >-
          cmake -S . -B build-ci -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/triplets"
          -DSIDECAR_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build-ci --parallel 2

      - name: Test
        run: ctest --test-dir build-ci --output-on-failure

      - name: Smoke-test CLI
        run: build-ci/bin/nats_sidecar --help

      - name: Install NATS Server
        if: matrix.gcc == 14
        env:
          NATS_SERVER_VERSION: 2.14.3
          NATS_SERVER_SHA256: f3d0c820c749f81d717310fb00d4903919e70e3e66b268bd352a088b9788eb93
        run: |
          archive="${RUNNER_TEMP}/nats-server.tar.gz"
          release="nats-server-v${NATS_SERVER_VERSION}-linux-amd64"
          curl --fail --location --silent --show-error \
            "https://github.com/nats-io/nats-server/releases/download/v${NATS_SERVER_VERSION}/${release}.tar.gz" \
            --output "${archive}"
          echo "${NATS_SERVER_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "${archive}" --directory "${RUNNER_TEMP}"
          mv "${RUNNER_TEMP}/${release}/nats-server" "${RUNNER_TEMP}/nats-server"

      - name: Test strict JetStream lifecycle
        if: matrix.gcc == 14
        run: >-
          python3 tests/integration_sidecar.py
          --nats-server "${RUNNER_TEMP}/nats-server"
          --sidecar build-ci/bin/nats_sidecar
          --config config/example.yaml

  sanitizers:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: address-undefined
            sanitizer: address
          - name: thread
            sanitizer: thread

    env:
      CC: gcc-14
      CXX: g++-14

    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++-14 ninja-build

      - name: Set up vcpkg
        uses: lukka/run-vcpkg@v11.6
        with:
          vcpkgGitCommitId: 4e82e29f14eac2b3422f18f72c7524d04f19924e

      - name: Configure
        run: >-
          cmake -S . -B build-sanitizer -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_OVERLAY_TRIPLETS="${GITHUB_WORKSPACE}/triplets"
          -DSIDECAR_BUILD_TESTS=ON
          -DSIDECAR_SANITIZER=${{ matrix.sanitizer }}

      - name: Build
        run: cmake --build build-sanitizer --parallel 2

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          TSAN_OPTIONS: halt_on_error=1:second_deadlock_stack=1
        run: ctest --test-dir build-sanitizer --output-on-failure
